<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Undangan Pernikahan</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&amp;display=swap" rel="stylesheet">
  <style>
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes floatIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        .fade-up { animation: fadeUp 1s ease forwards; opacity: 0; }
        .fade-up-1 { animation-delay: 0.2s; }
        .fade-up-2 { animation-delay: 0.5s; }
        .fade-up-3 { animation-delay: 0.8s; }
        .fade-up-4 { animation-delay: 1.1s; }
        .fade-up-5 { animation-delay: 1.4s; }
        .float-in { animation: floatIn 1.2s ease forwards; opacity: 0; animation-delay: 0.3s; }
        .shimmer-text {
            background: linear-gradient(90deg, #8B6914, #D4A843, #8B6914);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }
        .ornament::before, .ornament::after {
            content: '✦';
            margin: 0 12px;
            color: #D4A843;
        }
        .leaf-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 Q35 15 30 25 Q25 15 30 5' fill='none' stroke='%23D4A84320' stroke-width='1'/%3E%3C/svg%3E");
        }
    </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app-wrapper" class="h-full w-full overflow-auto leaf-pattern" style="background-color: #1a1a1a;">
   <div class="max-w-lg mx-auto py-12 px-4 space-y-6"><!-- Card -->
    <div id="card" class="rounded-3xl shadow-2xl overflow-hidden" style="background-color: #faf7f2;"><!-- Top ornamental band -->
     <div class="h-2" style="background: linear-gradient(90deg, #8B6914, #D4A843, #8B6914);"></div>
     <div class="px-8 py-12 md:px-12"><!-- Bismillah -->
      <p class="fade-up fade-up-1 text-center text-sm tracking-widest uppercase mb-8" style="font-family: 'Cormorant Garamond', serif; color: #8B6914;">Bismillahirrahmanirrahim</p><!-- Header -->
      <h1 id="title" class="fade-up fade-up-1 text-center text-lg mb-2" style="font-family: 'Cormorant Garamond', serif; color: #555;">Undangan Pernikahan</h1><!-- Names -->
      <div class="fade-up fade-up-2 text-center my-8">
       <p id="groom" class="shimmer-text text-5xl md:text-6xl font-bold" style="font-family: 'Playfair Display', serif;">Ahmad</p>
       <p class="text-3xl my-3" style="font-family: 'Playfair Display', serif; color: #D4A843;">&amp;</p>
       <p id="bride" class="shimmer-text text-5xl md:text-6xl font-bold" style="font-family: 'Playfair Display', serif;">Siti</p>
      </div><!-- Divider -->
      <div class="fade-up fade-up-3 flex items-center justify-center my-8">
       <div class="flex-1 h-px" style="background-color: #D4A843;"></div><span class="mx-4" style="color: #D4A843;"> <i data-lucide="heart" style="width:20px;height:20px;fill:#D4A843;stroke:#D4A843;"></i> </span>
       <div class="flex-1 h-px" style="background-color: #D4A843;"></div>
      </div><!-- Date & Location -->
      <div class="fade-up fade-up-3 text-center space-y-4 my-8">
       <div class="flex items-center justify-center gap-2"><i data-lucide="calendar" style="width:18px;height:18px;color:#8B6914;"></i>
        <p id="date-text" class="text-lg font-semibold" style="font-family: 'Cormorant Garamond', serif; color: #333;">Sabtu, 12 Desember 2026</p>
       </div>
       <div class="flex items-center justify-center gap-2"><i data-lucide="map-pin" style="width:18px;height:18px;color:#8B6914;"></i>
        <p id="location-text" class="text-base" style="font-family: 'Cormorant Garamond', serif; color: #555;">Gedung Serbaguna Maju Jaya, Jakarta</p>
       </div>
      </div><!-- RSVP Form -->
      <div class="fade-up fade-up-4 my-8">
       <p style="font-family: 'Cormorant Garamond', serif; color: #8B6914; font-weight: bold; margin-bottom: 12px;">Konfirmasi Kehadiran</p>
       <form id="rsvp-form" class="space-y-3">
        <input type="text" id="guest-name" placeholder="Nama Lengkap" class="w-full px-4 py-3 rounded-lg border-2" style="border-color: #D4A843; font-family: 'Cormorant Garamond', serif; font-size: 16px;" required> <input type="number" id="guest-count" placeholder="Jumlah Tamu" min="1" max="10" class="w-full px-4 py-3 rounded-lg border-2" style="border-color: #D4A843; font-family: 'Cormorant Garamond', serif; font-size: 16px;" required> <select id="guest-status" class="w-full px-4 py-3 rounded-lg border-2" style="border-color: #D4A843; font-family: 'Cormorant Garamond', serif; font-size: 16px;" required> <option value="">Pilih Status Kehadiran</option> <option value="Hadir">Hadir</option> <option value="Tidak Hadir">Tidak Hadir</option> </select> <button type="submit" class="w-full px-6 py-3 rounded-lg text-white font-semibold transition-all duration-300 hover:scale-105" style="background: linear-gradient(135deg, #8B6914, #D4A843);"> <i data-lucide="check" style="width:18px;height:18px;display:inline;margin-right:8px;"></i>Kirim Konfirmasi </button>
       </form>
       <div id="form-message" class="mt-3 p-3 rounded-lg text-center text-sm" style="display: none; font-family: 'Cormorant Garamond', serif;"></div>
      </div><!-- Closing -->
      <div class="fade-up fade-up-5 text-center mt-10 pt-8 border-t" style="border-color: #e8e0d4;">
       <p id="closing-text" class="text-base italic" style="font-family: 'Cormorant Garamond', serif; color: #777;">Terima kasih atas doa dan kehadiran Anda.</p>
      </div>
     </div><!-- Bottom ornamental band -->
     <div class="h-2" style="background: linear-gradient(90deg, #8B6914, #D4A843, #8B6914);"></div>
    </div><!-- Map Section -->
    <div id="map-card" class="rounded-3xl shadow-2xl overflow-hidden" style="background-color: #faf7f2;">
     <div class="h-2" style="background: linear-gradient(90deg, #8B6914, #D4A843, #8B6914);"></div>
     <div class="px-8 py-8 md:px-12">
      <h2 class="text-center text-lg font-semibold mb-4" style="font-family: 'Cormorant Garamond', serif; color: #8B6914;">Lokasi Acara</h2>
      <div id="map-container"></div>
      <p class="text-center mt-4 text-sm" style="font-family: 'Cormorant Garamond', serif; color: #555;"><span id="map-location">Gedung Serbaguna Maju Jaya<br>
        Jakarta</span></p>
     </div>
     <div class="h-2" style="background: linear-gradient(90deg, #8B6914, #D4A843, #8B6914);"></div>
    </div><!-- Attendance List Section -->
    <div id="attendance-card" class="rounded-3xl shadow-2xl overflow-hidden" style="background-color: #faf7f2;">
     <div class="h-2" style="background: linear-gradient(90deg, #8B6914, #D4A843, #8B6914);"></div>
     <div class="px-8 py-8 md:px-12">
      <h2 class="text-center text-lg font-semibold mb-6" style="font-family: 'Cormorant Garamond', serif; color: #8B6914;">Daftar Tamu (<span id="attendance-count">0</span>)</h2>
      <div id="attendance-list" class="space-y-3 max-h-80 overflow-y-auto"></div>
      <p id="empty-message" class="text-center text-sm italic" style="font-family: 'Cormorant Garamond', serif; color: #999;">Belum ada konfirmasi kehadiran</p>
     </div>
     <div class="h-2" style="background: linear-gradient(90deg, #8B6914, #D4A843, #8B6914);"></div>
    </div>
   </div>
  </div>
  <script>
        lucide.createIcons();

        const defaultConfig = {
            groom_name: "Ahmad",
            bride_name: "Siti",
            event_date: "Sabtu, 12 Desember 2026",
            event_location: "Gedung Serbaguna Maju Jaya, Jakarta",
            map_address: "Gedung Serbaguna Maju Jaya, Jakarta",
            closing_message: "Terima kasih atas doa dan kehadiran Anda.",
            background_color: "#1a1a1a",
            card_color: "#faf7f2",
            text_color: "#333333",
            accent_color: "#D4A843",
            secondary_text_color: "#555555",
            font_family: "Playfair Display",
            font_size: 16
        };

        let allAttendance = [];

        const dataHandler = {
            onDataChanged(data) {
                allAttendance = data;
                renderAttendanceList();
            }
        };

        async function initDataSdk() {
            const result = await window.dataSdk.init(dataHandler);
            if (!result.isOk) {
                console.error("Failed to init data SDK");
            }
        }

        function renderAttendanceList() {
            const container = document.getElementById('attendance-list');
            const emptyMsg = document.getElementById('empty-message');
            const countEl = document.getElementById('attendance-count');

            countEl.textContent = allAttendance.length;

            if (allAttendance.length === 0) {
                container.innerHTML = '';
                emptyMsg.style.display = 'block';
            } else {
                emptyMsg.style.display = 'none';
                container.innerHTML = allAttendance.map(item => `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f5f5f5; border-radius: 8px; border-left: 4px solid #D4A843;">
                        <div style="flex: 1;">
                            <p style="font-family: 'Cormorant Garamond', serif; font-weight: bold; color: #333; margin: 0;">${item.name}</p>
                            <p style="font-family: 'Cormorant Garamond', serif; font-size: 13px; color: #777; margin: 2px 0 0 0;">${item.guests} tamu • ${item.attendance_status}</p>
                        </div>
                        <button onclick="deleteAttendance('${item.__backendId}')" style="background: #ffebee; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; color: #d32f2f; font-size: 12px; font-family: 'Cormorant Garamond', serif;">Hapus</button>
                    </div>
                `).join('');
            }
        }

        async function deleteAttendance(id) {
            const record = allAttendance.find(r => r.__backendId === id);
            if (record) {
                const result = await window.dataSdk.delete(record);
                if (!result.isOk) {
                    alert('Gagal menghapus data');
                }
            }
        }

        document.getElementById('rsvp-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('guest-name').value.trim();
            const guests = document.getElementById('guest-count').value;
            const status = document.getElementById('guest-status').value;
            const msgEl = document.getElementById('form-message');

            if (!name || !guests || !status) {
                msgEl.style.display = 'block';
                msgEl.textContent = 'Semua field harus diisi';
                msgEl.style.background = '#ffebee';
                msgEl.style.color = '#d32f2f';
                return;
            }

            if (allAttendance.length >= 999) {
                msgEl.style.display = 'block';
                msgEl.textContent = 'Data sudah penuh (maksimal 999 tamu)';
                msgEl.style.background = '#ffebee';
                msgEl.style.color = '#d32f2f';
                return;
            }

            const result = await window.dataSdk.create({
                name,
                guests,
                attendance_status: status,
                created_at: new Date().toISOString()
            });

            if (result.isOk) {
                msgEl.style.display = 'block';
                msgEl.textContent = '✓ Konfirmasi berhasil dikirim!';
                msgEl.style.background = '#e8f5e9';
                msgEl.style.color = '#2e7d32';
                document.getElementById('rsvp-form').reset();
                setTimeout(() => { msgEl.style.display = 'none'; }, 3000);
            } else {
                msgEl.style.display = 'block';
                msgEl.textContent = 'Gagal mengirim konfirmasi';
                msgEl.style.background = '#ffebee';
                msgEl.style.color = '#d32f2f';
            }
        });

        function applyConfig(config) {
            const c = { ...defaultConfig, ...config };

            document.getElementById('groom').textContent = c.groom_name;
            document.getElementById('bride').textContent = c.bride_name;
            document.getElementById('date-text').textContent = c.event_date;
            document.getElementById('location-text').textContent = c.event_location;
            document.getElementById('closing-text').textContent = c.closing_message;

            // Update map with new address
            updateGoogleMap(c.map_address);
            document.getElementById('map-location').textContent = c.event_location;

            const wrapper = document.getElementById('app-wrapper');
            wrapper.style.backgroundColor = c.background_color;

            const card = document.getElementById('card');
            card.style.backgroundColor = c.card_color;

            document.getElementById('date-text').style.color = c.text_color;
            document.getElementById('closing-text').style.color = c.secondary_text_color;
            document.getElementById('location-text').style.color = c.secondary_text_color;

            const fontStack = `${c.font_family}, Playfair Display, serif`;
            document.getElementById('groom').style.fontFamily = fontStack;
            document.getElementById('bride').style.fontFamily = fontStack;

            const base = c.font_size;
            document.getElementById('groom').style.fontSize = `${base * 3}px`;
            document.getElementById('bride').style.fontSize = `${base * 3}px`;
            document.getElementById('date-text').style.fontSize = `${base * 1.1}px`;
            document.getElementById('location-text').style.fontSize = `${base}px`;
            document.getElementById('closing-text').style.fontSize = `${base}px`;
        }

        function updateGoogleMap(address) {
            const mapContainer = document.getElementById('map-container');
            const encodedAddress = encodeURIComponent(address);
            mapContainer.innerHTML = `<iframe width="100%" height="300" style="border: 2px solid #D4A843; border-radius: 12px;" src="https://www.google.com/maps/embed/v1/place?key=AIzaSyA9W-xd3gd-nD8Q3nXyEJmz5_t6qRNxQmI&q=${encodedAddress}" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>`;
        }

        window.elementSdk.init({
            defaultConfig,
            onConfigChange: async (config) => { applyConfig(config); },
            mapToCapabilities: (config) => ({
                recolorables: [
                    { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
                    { get: () => config.card_color || defaultConfig.card_color, set: (v) => { config.card_color = v; window.elementSdk.setConfig({ card_color: v }); } },
                    { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
                    { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
                    { get: () => config.secondary_text_color || defaultConfig.secondary_text_color, set: (v) => { config.secondary_text_color = v; window.elementSdk.setConfig({ secondary_text_color: v }); } }
                ],
                borderables: [],
                fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
                fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
            }),
            mapToEditPanelValues: (config) => new Map([
                ["groom_name", config.groom_name || defaultConfig.groom_name],
                ["bride_name", config.bride_name || defaultConfig.bride_name],
                ["event_date", config.event_date || defaultConfig.event_date],
                ["event_location", config.event_location || defaultConfig.event_location],
                ["map_address", config.map_address || defaultConfig.map_address],
                ["closing_message", config.closing_message || defaultConfig.closing_message]
            ])
        });

        initDataSdk();
    </script>

</html>
